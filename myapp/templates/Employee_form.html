<!-- templates/employee_form.html -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Management System</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family: 'Poppins', sans-serif;
        }

        body{
            min-height:100vh;
            background-image: url('https://images.unsplash.com/photo-1521791136064-7986c2920216');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            display:flex;
            justify-content:center;
            align-items:center;
            position:relative;
            padding:40px 15px;
        }

        /* Dark Overlay */
        body::before{
            content:'';
            position:absolute;
            width:100%;
            height:100%;
            background: rgba(0,0,0,0.65);
            top:0;
            left:0;
        }

        .form-container{
            position:relative;
            z-index:1;
            width:100%;
            max-width:600px;
            background: rgba(255,255,255,0.12);
            backdrop-filter: blur(12px);
            border-radius:20px;
            padding:40px;
            box-shadow:0 8px 32px rgba(0,0,0,0.35);
            border:1px solid rgba(255,255,255,0.2);
        }

        .employee-icon{
            font-size:60px;
            text-align:center;
            margin-bottom:10px;
        }

        .main-heading{
            text-align:center;
            color:#fff;
            font-size:36px;
            font-weight:700;
            margin-bottom:8px;
            text-transform:uppercase;
        }

        .sub-heading{
            text-align:center;
            color:#ddd;
            margin-bottom:30px;
            font-size:15px;
        }

        label{
            color:white;
            font-weight:500;
            margin-bottom:8px;
        }

        .form-control{
            height:50px;
            border-radius:12px;
            border:none;
            background: rgba(255,255,255,0.92);
            margin-bottom:18px;
        }

        .form-control:focus{
            box-shadow:none;
            border:2px solid #00c6ff;
        }

        .btn-custom{
            height:50px;
            border:none;
            border-radius:12px;
            font-size:17px;
            font-weight:600;
            transition:0.3s;
        }

        .btn-primary{
            background: linear-gradient(to right, #00c6ff, #0072ff);
        }

        .btn-primary:hover{
            transform:translateY(-2px);
        }

        .btn-success{
            background: linear-gradient(to right, #11998e, #38ef7d);
            border:none;
        }

        .btn-success:hover{
            transform:translateY(-2px);
        }

    </style>

</head>
<body>

<div class="form-container">

    <div class="employee-icon">👨‍💼</div>

    <h1 class="main-heading">
        Employee Management System
    </h1>

    <p class="sub-heading">
        Manage Employee Records Easily
    </p>

    <form method="POST">

        {% csrf_token %}

        {% if form.instance.id %}
        <div class="mb-3">
            <label>Employee ID</label>
            <input type="text"
                   value="{{ form.instance.employee_id }}"
                   class="form-control"
                   placeholder="Employee ID"
                   readonly
                   style="background-color: #e9ecef;">
        </div>
        {% endif %}

        <div class="mb-3">
            <label>Employee Name</label>

            <input type="text"
                   name="name"
                   value="{{ form.name.value|default:'' }}"
                   class="form-control"
                   placeholder="Enter employee name"
                   required>
        </div>

        <div class="mb-3">
            <label>Email Address</label>

            <input type="email"
                   name="email"
                   value="{{ form.email.value|default:'' }}"
                   class="form-control"
                   placeholder="Enter email address"
                   required>
        </div>

        <div class="mb-3">
            <label>Department</label>

            <input type="text"
                   name="department"
                   value="{{ form.department.value|default:'' }}"
                   class="form-control"
                   placeholder="Enter department"
                   required>
        </div>

        <div class="mb-3">
            <label>Salary</label>

            <input type="number"
                   name="salary"
                   value="{{ form.salary.value|default:'' }}"
                   class="form-control"
                   placeholder="Enter salary"
                   required>
        </div>

        <button type="submit"
                class="btn btn-primary w-100 btn-custom">
            Save Employee
        </button>

        <a href="{% url 'employee_list' %}"
           class="btn btn-success w-100 btn-custom mt-3">
            Employee List
        </a>

    </form>

</div>

</body>
</html>
